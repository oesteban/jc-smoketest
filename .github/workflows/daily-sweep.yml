name: Journal Club — daily sweep

# Expire overdue claims, send day-9/day-11 reminders, and refresh the public
# aggregates (status.json + ranking.json). Cloned from the website calendar.yml
# scheduled-Action pattern. Idempotent: reads absolute timestamps, so a skipped
# day self-heals on the next run.

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC daily
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: jc-daily-sweep
  cancel-in-progress: false

jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Run the sweep
        run: python scripts/sweep.py

      - name: Post reminder / expiry comments
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python - <<'PY'
          import json, subprocess
          for n in json.load(open("notifications.json")):
              subprocess.run(["gh","issue","comment",str(n["issue"]),"--body",n["body"]], check=False)
          PY

      - name: Commit + push refreshed state
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add claims docs/data/status.json docs/data/ranking.json
          git diff --cached --quiet && { echo "no changes"; exit 0; }
          git commit -m "jc: daily sweep $(date -u +%Y-%m-%d)"
          git push origin HEAD:${GITHUB_REF#refs/heads/}
