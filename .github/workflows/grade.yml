name: Journal Club — grade a review

# Organizer-only. Enters the 5 rubric axis scores (0-5) for one submitted review
# into the ledger, flips the claim submitted->completed (or ->returned if below the
# quality floor), and refreshes status.json + ranking.json so the board moves at once.
# Only the scores cross into the public repo — never the PDF, never an email.

on:
  workflow_dispatch:
    inputs:
      issue: { description: "Claim issue number", required: true, type: string }
      paper: { description: "Paper ID (e.g. EEG-03)", required: true, type: string }
      engagement: { description: "Engagement 0-5", required: true, type: string }
      comprehension: { description: "Comprehension 0-5", required: true, type: string }
      critical: { description: "Critical appraisal 0-5", required: true, type: string }
      action: { description: "Action relevance 0-5", required: true, type: string }
      originality: { description: "Originality / non-AI 0-5", required: true, type: string }

permissions:
  contents: write

concurrency:
  group: jc-state-push
  cancel-in-progress: false

jobs:
  grade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Enter score
        run: |
          python scripts/grade.py \
            --issue "${{ inputs.issue }}" --paper "${{ inputs.paper }}" \
            --engagement "${{ inputs.engagement }}" \
            --comprehension "${{ inputs.comprehension }}" \
            --critical "${{ inputs.critical }}" \
            --action "${{ inputs.action }}" \
            --originality "${{ inputs.originality }}" \
            --grader "${{ github.actor }}"

      - name: Commit + push
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add ledger claims docs/data/status.json docs/data/ranking.json
          git diff --cached --quiet && { echo "no changes"; exit 0; }
          git commit -m "jc: grade ${{ inputs.paper }} (issue #${{ inputs.issue }})"
          git push origin HEAD:${GITHUB_REF#refs/heads/}
